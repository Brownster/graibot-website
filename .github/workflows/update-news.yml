name: Refresh AI News Feed

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */12 * * *'

permissions:
  contents: write

jobs:
  refresh-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update news data
        run: node scripts/update-news.mjs

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No updates found."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add news/news-data.json
          git commit -m "chore(news): refresh automated AI feed"
          git push
